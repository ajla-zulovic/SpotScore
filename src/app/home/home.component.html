<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="home.component.css" />
    <title>Your Page Title</title>
  </head>

  <body>
    <app-notification></app-notification>
    <div class="div-text">
      <h1>Looking for?</h1>
    </div>

    <div class="navbar-new">
      <ul>
        <li>
          <a
            href="#"
            [ngClass]="{ acTivee: selectedCategory === 'Restaurants' }"
            (click)="selectCategory('Restaurants', $event)"
            >Restaurants</a
          >
        </li>
        <li>
          <a
            href="#"
            [ngClass]="{ acTivee: selectedCategory === 'Hotels' }"
            (click)="selectCategory('Hotels', $event)"
            >Hotels</a
          >
        </li>
        <li>
          <a
            href="#"
            [ngClass]="{ acTivee: selectedCategory === 'Movies' }"
            (click)="selectCategory('Movies', $event)"
            >Movies</a
          >
        </li>
        <li>
          <a
            href="#"
            [ngClass]="{ acTivee: selectedCategory === 'Books' }"
            (click)="selectCategory('Books', $event)"
            >Books</a
          >
        </li>
      </ul>
    </div>

    <!-- SEARCH PART -->
    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="Looking for restaurants, hotels ... "
      />
      <button>Search</button>
    </div>

    <div class="filter-container">
      <h2>{{ selectedOption }} of {{ selectedCategory }}</h2>
      <input
        type="radio"
        name="filter"
        value="All"
        [(ngModel)]="selectedOption"
      />
      <span>All</span>
      <input
        type="radio"
        name="filter"
        value="Latest"
        [(ngModel)]="selectedOption"
      />
      <span>Latest</span>
      <input
        type="radio"
        name="filter"
        value="Most reviewed"
        [(ngModel)]="selectedOption"
      />
      <span>Most reviewed</span>
    </div>

    <div *ngIf="selectedCategory">
      <section id="section-offers" class="offers-offers">
        <div
          *ngFor="let o of filterOffers()"
          class="offer"
          [routerLink]="['/Offers', o.id]"
        >
          <img [src]="o.img" alt="Offer Image" />
          <div class="offer-details">
            <div class="offer-name">{{ o.name }}</div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
